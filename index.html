<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vigilancia Paludismo - Geomapa</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #020617; color: #e2e8f0; overflow: hidden; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .leaflet-popup-content-wrapper { background-color: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 0.75rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); }
        .leaflet-popup-tip { background-color: #0f172a; border-bottom: 1px solid #334155; border-right: 1px solid #334155; }
        .leaflet-container { background: #020617; outline: 0; transition: background-color 0.3s ease; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ============================================================================
        // ⚠️ ENLACE DE GOOGLE SHEETS / CSV ⚠️
        // ============================================================================
        const URL_DATOS_PALUDISMO = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSmUYzKkF9DyvaRwTKsmAUcGLjYtY9eKHf-EawZlXlNIyQR29rwPvWwx7KwYKDzsNWfooV69MIuvHX3/pub?gid=1233922753&single=true&output=csv'; 

        // --- BASE DE DATOS FIJA: RED DE NOTIFICANTES ---
        const RED_NOTIFICANTES = [
            { nombre: "Samuel Garza", lugar: "Rancho El Gigante", direccion: "Ejido Palmitos S/N", lat: 25.46698, lng: -99.98394 },
            { nombre: "Pastor Manuel Rosales", lugar: "Iglesia Lirio de los Valles", direccion: "Ejido la Haciendita S/N", lat: 25.51675, lng: -99.76362 },
            { nombre: "Isabel Garza", lugar: "Productos Hortícolas Garza", direccion: "Ejido casas viejas S/N", lat: 25.47294, lng: -99.92399 },
            { nombre: "Aero Tours", lugar: "Agencia de viajes Aerotours", direccion: "Mutualismo 102 Col Centro", lat: 25.59212, lng: -100.00023 },
            { nombre: "Excel Tours", lugar: "Agencia de viajes Excel Tours", direccion: "Rosendo Garza 112 Col Centro", lat: 25.59120, lng: -100.00423 },
            { nombre: "Cano Tours", lugar: "Agencia de viajes Cano Tours", direccion: "Gómez Farías 307 Col. López Mateos", lat: 25.58066, lng: -100.00786 }
        ];

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorInfo: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, errorInfo: error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="h-screen w-full bg-slate-950 flex flex-col items-center justify-center text-center p-6">
                            <i className="fa-solid fa-triangle-exclamation text-rose-500 text-6xl mb-6"></i>
                            <h1 className="text-3xl font-black text-white mb-4">Error de Renderizado</h1>
                            <p className="text-slate-400 mb-6">Se interceptó un problema con los datos del mapa.</p>
                            <button onClick={() => window.location.reload()} className="px-6 py-3 bg-rose-600 hover:bg-rose-500 text-white font-bold rounded-xl shadow-lg transition-all">Recargar Plataforma</button>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        function MapaInteractivo({ data, mapStyle, coloresEspecie, mostrarNotificantes }) {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const tileLayerInstance = useRef(null);
            const markerGroupInstance = useRef(null);

            // Inicializar mapa base
            useEffect(() => {
                if (!mapInstance.current && mapRef.current) {
                    mapInstance.current = L.map(mapRef.current, {
                        zoomControl: true,
                        attributionControl: false 
                    }).setView([16.75, -93.12], 6); // Centrado sur de México por defecto
                    
                    markerGroupInstance.current = L.layerGroup().addTo(mapInstance.current);
                }
                return () => {
                    if (mapInstance.current) {
                        mapInstance.current.remove();
                        mapInstance.current = null;
                    }
                };
            }, []);

            // Actualizar estilo del mapa
            useEffect(() => {
                if (!mapInstance.current) return;
                
                if (tileLayerInstance.current) {
                    mapInstance.current.removeLayer(tileLayerInstance.current);
                }

                let url = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
                let bgColor = '#020617'; 

                if (mapStyle === 'claro') {
                    url = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
                    bgColor = '#f8fafc'; 
                } else if (mapStyle === 'satelite') {
                    url = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
                    bgColor = '#111111'; 
                }

                if (mapRef.current) mapRef.current.style.backgroundColor = bgColor;

                tileLayerInstance.current = L.tileLayer(url, {
                    subdomains: 'abcd', maxZoom: 19, crossOrigin: true 
                }).addTo(mapInstance.current);
            }, [mapStyle]);

            useEffect(() => {
                if (!mapInstance.current || !markerGroupInstance.current) return;
                
                markerGroupInstance.current.clearLayers(); 
                
                if (data && data.length > 0) {
                    try {
                        const bounds = L.latLngBounds();
                        let validPointsCount = 0;
                        
                        data.forEach(punto => {
                            if (typeof punto.lat === 'number' && !isNaN(punto.lat) && typeof punto.lng === 'number' && !isNaN(punto.lng)) {
                                const colorEspecie = coloresEspecie[punto.especie] || '#64748b';
                                
                                const marker = L.circleMarker([punto.lat, punto.lng], {
                                    radius: 6 + (punto.casos > 5 ? 3 : 0), 
                                    color: colorEspecie,
                                    weight: 2,
                                    fillColor: colorEspecie,
                                    fillOpacity: 0.7
                                }).addTo(markerGroupInstance.current);

                                const popupContent = `
                                    <div style="font-family: sans-serif; min-width: 180px;">
                                        <p style="font-weight: bold; color: ${colorEspecie}; margin: 0 0 6px 0; border-bottom: 1px solid #334155; padding-bottom: 4px; font-size: 14px;">
                                            <i class="fa-solid fa-mosquito" style="margin-right:4px;"></i> ${punto.especie}
                                        </p>
                                        <p style="font-size: 12px; margin: 0 0 2px 0; color: #cbd5e1;"><b>Estadio:</b> <span style="color: #67e8f9;">${punto.estadio}</span></p>
                                        <p style="font-size: 12px; margin: 0 0 2px 0; color: #cbd5e1;"><b>Jurisdicción:</b> ${punto.jurisdiccion}</p>
                                        <p style="font-size: 12px; margin: 0 0 2px 0; color: #cbd5e1;"><b>Municipio:</b> ${punto.municipio}</p>
                                        <p style="font-size: 12px; margin: 0 0 6px 0; color: #cbd5e1;"><b>Localidad:</b> ${punto.localidad}</p>
                                        <div style="background: #1e293b; padding: 4px 8px; border-radius: 4px; display: inline-block;">
                                            <p style="font-size: 13px; margin: 0; color: white;">Casos registrados: <b style="color: #f87171;">${punto.casos}</b></p>
                                        </div>
                                    </div>
                                `;
                                marker.bindPopup(popupContent);
                                bounds.extend([punto.lat, punto.lng]);
                                validPointsCount++;
                            }
                        });
                        
                        // --- 🏥 DIBUJAR PUESTOS NOTIFICANTES EN EL MAPA ---
                        if (mostrarNotificantes) {
                            RED_NOTIFICANTES.forEach(puesto => {
                                // Creación de un Icono HTML Azul tipo "Hospital/Centro Médico"
                                const iconHtml = `<div style="background-color: #3b82f6; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 2px solid #ffffff; box-shadow: 0 0 15px rgba(59, 130, 246, 0.8);"><i class="fa-solid fa-house-medical" style="font-size: 14px;"></i></div>`;
                                const customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [30, 30], iconAnchor: [15, 15] });
                                
                                const marker = L.marker([puesto.lat, puesto.lng], { icon: customIcon }).addTo(markerGroupInstance.current);
                                
                                const popupContent = `
                                    <div style="font-family: sans-serif; min-width: 200px;">
                                        <p style="font-weight: bold; color: #60a5fa; margin: 0 0 6px 0; border-bottom: 1px solid #334155; padding-bottom: 4px; font-size: 14px;">
                                            <i class="fa-solid fa-tower-observation" style="margin-right:4px;"></i> Red de Notificantes
                                        </p>
                                        <p style="font-size: 13px; margin: 0 0 2px 0; color: white;"><b>${puesto.lugar}</b></p>
                                        <p style="font-size: 12px; margin: 0 0 2px 0; color: #cbd5e1;"><b>Contacto:</b> ${puesto.nombre}</p>
                                        <p style="font-size: 12px; margin: 0 0 6px 0; color: #cbd5e1;"><b>Dirección:</b> ${puesto.direccion}</p>
                                    </div>
                                `;
                                marker.bindPopup(popupContent);
                                bounds.extend([puesto.lat, puesto.lng]); // Ampliamos la cámara para que los incluya a todos
                                validPointsCount++;
                            });
                        }
                        
                        // Protección Anti-Crash: Centrar el mapa solo si hay puntos válidos y la ventana existe
                        if (validPointsCount > 0 && bounds.isValid()) {
                            const executeSafeFlyTo = () => {
                                if (mapInstance.current) {
                                    const mapSize = mapInstance.current.getSize();
                                    if (mapSize && mapSize.x > 0 && mapSize.y > 0) {
                                        mapInstance.current.flyToBounds(bounds, { padding: [40, 40], duration: 1.0, maxZoom: 14 });
                                    }
                                }
                            };

                            const currentSize = mapInstance.current.getSize();
                            if (currentSize && currentSize.x > 0 && currentSize.y > 0) {
                                executeSafeFlyTo();
                            } else {
                                setTimeout(() => {
                                    if (mapInstance.current) {
                                        mapInstance.current.invalidateSize();
                                        executeSafeFlyTo();
                                    }
                                }, 500);
                            }
                        }
                    } catch (err) {
                        console.error("Error aislando y graficando puntos: ", err);
                    }
                }
            }, [data]);

            return <div ref={mapRef} style={{ width: '100%', height: '100%', borderRadius: '0.75rem', zIndex: 1 }}></div>;
        }

        function GeomapaDashboard() {
            const [rawData, setRawData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);

            // Filtros de estado
            const [filtroJurisdiccion, setFiltroJurisdiccion] = useState('Todas');
            const [filtroEspecie, setFiltroEspecie] = useState('Todas');
            const [filtroEstadio, setFiltroEstadio] = useState('Todos');
            const [mapStyle, setMapStyle] = useState('oscuro');
            
            // Nuevo Estado: Mostrar Puestos Notificantes
            const [mostrarNotificantes, setMostrarNotificantes] = useState(true);

            // Función para dividir filas CSV ignorando comas dentro de comillas
            const splitCSVRowSafe = (row) => {
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
            };

            const extraerCoordenadas = (coordStr) => {
                if (!coordStr) return { lat: NaN, lng: NaN };
                let lat = NaN, lng = NaN;
                let str = coordStr.toUpperCase().trim();

                // 1. ¿Es formato de Grados, Minutos y Segundos (DMS)? Ej: 25°31´32.10´´N
                if (str.includes('°')) {
                    // Limpiar caracteres extraños
                    str = str.replace(/´´|''|”|"/g, '"').replace(/´|‘|’|'/g, "'");
                    // Regex robusto para atrapar [Grados] [Minutos] [Segundos] [Orientación N/S/E/W]
                    const regexDMS = /(\d+)[°\s]+(\d+)['\s]+([\d.]+)["\s]*([NSEW])/g;
                    const coincidencias = [...str.matchAll(regexDMS)];

                    if (coincidencias.length >= 2) {
                        const convertirADecimal = (match) => {
                            let grados = parseFloat(match[1]) || 0;
                            let minutos = parseFloat(match[2]) || 0;
                            let segundos = parseFloat(match[3]) || 0;
                            let direccion = match[4];
                            
                            let decimal = grados + (minutos / 60) + (segundos / 3600);
                            return (direccion === 'S' || direccion === 'W') ? -decimal : decimal;
                        };
                        lat = convertirADecimal(coincidencias[0]);
                        lng = convertirADecimal(coincidencias[1]);
                        return { lat, lng };
                    }
                }

                // 2. Si no es DMS, intentar formato Decimal tradicional (Ej: 25.52, -100.01)
                str = str.replace(/['"°]/g, ''); 
                // Atrapar números con o sin signo, con decimales (o enteros en casos raros)
                const matchesDecimales = str.match(/-?\d+(\.\d+)?/g);
                if (matchesDecimales && matchesDecimales.length >= 2) {
                    lat = parseFloat(matchesDecimales[0]);
                    lng = parseFloat(matchesDecimales[1]);
                } else {
                    // 3. Fallback: División simple
                    const partes = str.split(/[,;\s]+/).filter(p => p.length > 0);
                    if (partes.length >= 2) {
                        lat = parseFloat(partes[0]);
                        lng = parseFloat(partes[1]);
                    }
                }
                return { lat, lng };
            };

            const parsearCSVPaludismo = (csvText) => {
                const cleanText = csvText.replace(/[\r]/g, '');
                const rows = cleanText.split('\n');
                if (rows.length <= 1) return [];

                let headerRowIndex = 0;
                const headers = splitCSVRowSafe(rows[headerRowIndex]).map(h => h.toLowerCase());

                // Detectar los índices de las columnas útiles
                const jurIdx = headers.findIndex(h => h.includes('jurisdiccion') || h.includes('jur'));
                const munIdx = headers.findIndex(h => h.includes('municipio') || h.includes('mun'));
                const locIdx = headers.findIndex(h => h.includes('localidad') || h.includes('loc'));
                const espIdx = headers.findIndex(h => h.includes('especie') || h.includes('vector') || h.includes('anopheles') || h.includes('resultado'));
                const casosIdx = headers.findIndex(h => h.includes('casos') || h.includes('total'));
                const estIdx = headers.findIndex(h => h.includes('estadio') || h.includes('fase'));
                
                const data = [];
                
                // Recorrer filas (omitiendo cabecera)
                for (let i = headerRowIndex + 1; i < rows.length; i++) {
                    const cols = splitCSVRowSafe(rows[i]);
                    if (cols.length === 0 || (cols.length === 1 && cols[0] === "")) continue;

                    let lat = NaN, lng = NaN;

                    // Asumimos siempre que la Columna K (índice 10) trae las coordenadas combinadas
                    let targetIdx = 10; 
                    
                    if (cols.length > targetIdx && cols[targetIdx] && cols[targetIdx].trim() !== '') {
                        const coords = extraerCoordenadas(cols[targetIdx]);
                        lat = coords.lat;
                        lng = coords.lng;
                    }

                    // Autocorrección de Inversión (Latitud/Longitud cambiadas)
                    if (!isNaN(lat) && !isNaN(lng)) {
                        if (Math.abs(lat) > 90 && Math.abs(lng) <= 90) {
                            let temp = lat;
                            lat = lng;
                            lng = temp;
                        }
                    }

                    // Guardado Final
                    if (!isNaN(lat) && !isNaN(lng) && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
                        if (lat !== 0 || lng !== 0) { // Omitir 0,0
                            // Buscar Especie (Prioridad Columna O - Índice 14) 
                            let especieBruta = cols.length > 14 && cols[14] && cols[14].trim() !== '' ? cols[14].trim() : (espIdx !== -1 && cols[espIdx] ? cols[espIdx].trim() : '');
                            
                            // 🧹 LIMPIADOR Y FILTRO ESTRICTO MULTI-ESPECIE
                            let espBuscadora = especieBruta.toLowerCase();
                            let especiesEncontradas = [];

                            // 1. Buscamos Pseudopunctipennis
                            if (espBuscadora.includes('pseudo')) {
                                especiesEncontradas.push('Anopheles pseudopunctipennis');
                                // Lo "borramos" temporalmente de la frase para que la palabra "punctipennis" que lleva adentro no nos haga un falso positivo
                                espBuscadora = espBuscadora.replace(/pseudo[a-z]*/g, '');
                            }

                            // 2. Buscamos Quadrimaculatus
                            if (espBuscadora.includes('quadri') || espBuscadora.includes('cuadri')) {
                                especiesEncontradas.push('Anopheles quadrimaculatus');
                            }

                            // 3. Buscamos Punctipennis puro (ahora es seguro porque ya quitamos la palabra "pseudo")
                            if (espBuscadora.includes('puncti') || espBuscadora.includes('punti')) { 
                                especiesEncontradas.push('Anopheles punctipennis');
                            }

                            // 🚫 FILTRO DE ELIMINACIÓN: Si no detectó ninguna de las 3, saltamos el registro
                            if (especiesEncontradas.length === 0) {
                                continue; 
                            }

                            // Buscar Estadio (Prioridad Columna N - Índice 13)
                            let estadioRaw = cols.length > 13 && cols[13] && cols[13].trim() !== '' ? cols[13].trim() : (estIdx !== -1 && cols[estIdx] ? cols[estIdx].trim() : 'No definido');
                            
                            // 🔄 MULTI-REGISTRO: Si encontraron 2 especies en la misma celda (Ej: pseudo/puncti), creamos un punto para cada una
                            especiesEncontradas.forEach((especieLimpia, subIdx) => {
                                data.push({
                                    id: `${i}-${subIdx}`, // ID único para evitar choques
                                    lat: lat,
                                    lng: lng,
                                    jurisdiccion: jurIdx !== -1 && cols[jurIdx] ? cols[jurIdx] : 'Jurisdicción Sanitaria 6',
                                    municipio: munIdx !== -1 && cols[munIdx] ? cols[munIdx] : 'No definido',
                                    localidad: locIdx !== -1 && cols[locIdx] ? cols[locIdx] : 'No definida',
                                    especie: especieLimpia,
                                    estadio: estadioRaw,
                                    casos: 1 // Al separarlos, cuenta como 1 caso por especie para no inflar la estadística por error
                                });
                            });
                        }
                    }
                }
                return data;
            };

            useEffect(() => {
                const cargarDatos = async () => {
                    setIsLoading(true);
                    setErrorMsg(null);
                    if (URL_DATOS_PALUDISMO) {
                        try {
                            const response = await fetch(URL_DATOS_PALUDISMO);
                            if (!response.ok) throw new Error("Falla HTTP al conectar con Google Sheets.");
                            
                            const text = await response.text();
                            const parseado = parsearCSVPaludismo(text);
                            
                            if (parseado.length > 0) {
                                setRawData(parseado);
                            } else {
                                setErrorMsg("Se leyó tu documento, pero no se detectaron coordenadas válidas en la Columna K. Asegúrate de que las celdas tengan contenido como '16.75, -93.12'.");
                            }
                        } catch (error) {
                            setErrorMsg(`Fallo de red: ${error.message}. Verifica tu conexión a internet o que el enlace de Google Sheets sea público.`);
                        } finally {
                            setIsLoading(false);
                        }
                    }
                };
                cargarDatos();
            }, []);

            // Filtrado dinámico
            const listas = useMemo(() => {
                const jur = new Set();
                const esp = new Set();
                const est = new Set();
                rawData.forEach(d => {
                    if (d.jurisdiccion) jur.add(d.jurisdiccion);
                    if (d.especie) esp.add(d.especie);
                    if (d.estadio) est.add(d.estadio);
                });
                
                // 🎨 ASIGNACIÓN DE COLORES FIJOS INSTITUCIONALES
                const coloresFijos = {
                    'Anopheles pseudopunctipennis': '#f43f5e', // Rosa Intenso
                    'Anopheles quadrimaculatus': '#0ea5e9',    // Azul Celeste
                    'Anopheles punctipennis': '#10b981',       // Verde Esmeralda
                    'Desconocida': '#64748b'                   // Gris
                };

                const especiesArray = Array.from(esp).sort();
                const coloresMap = {};
                
                // Colores extra por si algún día registras una especie nueva que no sean las 3 de arriba
                const paletaExtra = ['#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316'];
                let indexExtra = 0;

                especiesArray.forEach((especie) => {
                    if (coloresFijos[especie]) {
                        coloresMap[especie] = coloresFijos[especie]; // Aplica el color fijo
                    } else {
                        coloresMap[especie] = paletaExtra[indexExtra % paletaExtra.length]; // Aplica color dinámico a las raras
                        indexExtra++;
                    }
                });

                return {
                    jurisdicciones: Array.from(jur).sort(),
                    especies: especiesArray,
                    estadios: Array.from(est).sort(),
                    colores: coloresMap
                };
            }, [rawData]);

            const datosFiltrados = useMemo(() => {
                return rawData.filter(d => {
                    const matchJur = filtroJurisdiccion === 'Todas' || d.jurisdiccion === filtroJurisdiccion;
                    const matchEsp = filtroEspecie === 'Todas' || d.especie === filtroEspecie;
                    const matchEst = filtroEstadio === 'Todos' || d.estadio === filtroEstadio;
                    return matchJur && matchEsp && matchEst;
                });
            }, [rawData, filtroJurisdiccion, filtroEspecie, filtroEstadio]);

            const stats = useMemo(() => {
                return {
                    totalPuntos: datosFiltrados.length,
                    totalCasos: datosFiltrados.reduce((sum, curr) => sum + curr.casos, 0)
                };
            }, [datosFiltrados]);

            return (
                <div className="h-screen w-full bg-slate-950 flex flex-col font-sans selection:bg-emerald-500 selection:text-white">
                    
                    {/* ENCABEZADO */}
                    <nav className="w-full bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4 py-3 z-50 shrink-0 shadow-lg">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-emerald-500/10 rounded-lg border border-emerald-500/20 shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                                <i className="fa-solid fa-mosquito text-emerald-400 text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-lg md:text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500 tracking-wider">
                                    PALUDISMO <span className="font-light text-slate-400 hidden sm:inline">| Vigilancia Ento-Epidemiológica</span>
                                </h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">
                                    Centro de Inteligencia Espacial
                                </p>
                            </div>
                        </div>

                        <div className="flex items-center gap-2">
                            <span className={`border text-[10px] px-2 py-1 rounded-full flex items-center gap-1.5 font-bold shadow-sm ${isLoading ? 'bg-amber-500/20 text-amber-400 border-amber-500/30' : errorMsg ? 'bg-rose-500/20 text-rose-400 border-rose-500/30' : 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30'}`}>
                                <i className={`fa-solid ${isLoading ? 'fa-satellite-dish animate-pulse' : errorMsg ? 'fa-triangle-exclamation' : 'fa-check'}`}></i> 
                                <span className="hidden sm:inline">{isLoading ? 'Sincronizando...' : errorMsg ? 'Error de Datos' : 'Sistema Activo'}</span>
                            </span>
                        </div>
                    </nav>

                    {/* ÁREA PRINCIPAL */}
                    <main className="flex-1 p-3 md:p-4 flex flex-col md:flex-row gap-4 overflow-hidden bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-slate-950">
                        
                        {/* PANEL LATERAL DE CONTROLES */}
                        <aside className="w-full md:w-80 shrink-0 flex flex-col gap-4 overflow-y-auto no-scrollbar z-10 animate-fade-in">
                            
                            <div className="bg-slate-900/80 backdrop-blur-md border border-slate-800 rounded-2xl p-4 shadow-xl">
                                <h3 className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-3 flex items-center gap-2">
                                    <i className="fa-solid fa-chart-pie"></i> Resumen de Vista
                                </h3>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-slate-950 rounded-xl p-3 border border-slate-800/50">
                                        <p className="text-[10px] text-slate-500 font-medium">Focos Detectados</p>
                                        <p className="text-2xl font-black text-white">{stats.totalPuntos}</p>
                                    </div>
                                    <div className="bg-rose-950/30 rounded-xl p-3 border border-rose-900/50">
                                        <p className="text-[10px] text-rose-400/70 font-medium">Casos Estimados</p>
                                        <p className="text-2xl font-black text-rose-400">{stats.totalCasos}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-900/80 backdrop-blur-md border border-slate-800 rounded-2xl p-4 shadow-xl flex-1">
                                <h3 className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-4 flex items-center gap-2">
                                    <i className="fa-solid fa-filter"></i> Filtros Espaciales
                                </h3>
                                
                                <div className="space-y-4">
                                    {/* Selector Jurisdicción */}
                                    <div>
                                        <label className="text-[11px] text-slate-400 mb-1 block">Jurisdicción Sanitaria</label>
                                        <div className="relative">
                                            <i className="fa-solid fa-map-location-dot absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                                            <select 
                                                className="w-full bg-slate-950 text-sm text-white font-semibold rounded-xl border border-slate-700 pl-9 pr-3 py-2.5 outline-none focus:border-emerald-500 transition-colors appearance-none cursor-pointer"
                                                value={filtroJurisdiccion}
                                                onChange={e => setFiltroJurisdiccion(e.target.value)}
                                            >
                                                <option value="Todas">Todas las Jurisdicciones</option>
                                                {listas.jurisdicciones.map(j => <option key={j} value={j}>{j}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    {/* Selector Especie */}
                                    <div>
                                        <label className="text-[11px] text-slate-400 mb-1 block">Vector (Especie Anopheles)</label>
                                        <div className="relative">
                                            <i className="fa-solid fa-bug absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                                            <select 
                                                className="w-full bg-slate-950 text-sm text-white font-semibold rounded-xl border border-slate-700 pl-9 pr-3 py-2.5 outline-none focus:border-emerald-500 transition-colors appearance-none cursor-pointer"
                                                value={filtroEspecie}
                                                onChange={e => setFiltroEspecie(e.target.value)}
                                            >
                                                <option value="Todas">Todas las Especies</option>
                                                {listas.especies.map(e => <option key={e} value={e}>{e}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    {/* Selector Estadio */}
                                    <div>
                                        <label className="text-[11px] text-slate-400 mb-1 block">Estadio de Desarrollo</label>
                                        <div className="relative">
                                            <i className="fa-solid fa-microscope absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                                            <select 
                                                className="w-full bg-slate-950 text-sm text-white font-semibold rounded-xl border border-slate-700 pl-9 pr-3 py-2.5 outline-none focus:border-emerald-500 transition-colors appearance-none cursor-pointer"
                                                value={filtroEstadio}
                                                onChange={e => setFiltroEstadio(e.target.value)}
                                            >
                                                <option value="Todos">Todos los Estadios</option>
                                                {listas.estadios.map(e => <option key={e} value={e}>{e}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    {/* Botón Interruptor para Puestos Notificantes */}
                                    <div className="pt-2">
                                        <label className="flex items-center gap-3 cursor-pointer p-3 rounded-xl border border-slate-800 bg-slate-950/50 hover:bg-slate-800 transition-colors select-none">
                                            <div className="relative">
                                                <input type="checkbox" className="sr-only" checked={mostrarNotificantes} onChange={() => setMostrarNotificantes(!mostrarNotificantes)} />
                                                <div className={`block w-10 h-6 rounded-full transition-colors ${mostrarNotificantes ? 'bg-blue-500' : 'bg-slate-700'}`}></div>
                                                <div className={`absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${mostrarNotificantes ? 'transform translate-x-4' : ''}`}></div>
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-[11px] font-bold text-white flex items-center gap-2"><i className="fa-solid fa-house-medical text-blue-400"></i> Red Notificantes</span>
                                                <span className="text-[9px] text-slate-400">Mostrar agencias y puestos de reporte</span>
                                            </div>
                                        </label>
                                    </div>
                                    
                                    {/* Leyenda Dinámica */}
                                    <div className="pt-4 mt-2 border-t border-slate-800">
                                        <label className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-2 block">Vectores Encontrados</label>
                                        <div className="space-y-2">
                                            {listas.especies.map((esp) => (
                                                <div key={esp} className="flex items-center gap-2 text-xs text-slate-300">
                                                    <div className="w-3 h-3 rounded-full shadow-sm" style={{backgroundColor: listas.colores[esp]}}></div>
                                                    <span className={esp.toLowerCase().includes('an.') ? 'italic' : ''}>{esp}</span>
                                                </div>
                                            ))}
                                            {listas.especies.length === 0 && <p className="text-xs text-slate-600">No hay datos</p>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* CONTENEDOR DEL MAPA */}
                        <div className="flex-1 bg-slate-900/50 border border-slate-800 rounded-2xl relative overflow-hidden shadow-2xl flex flex-col z-0">
                            
                            <div className="absolute top-3 right-3 z-[400] flex gap-2">
                                <div className="bg-slate-900/90 backdrop-blur border border-slate-700 rounded-lg p-1 shadow-lg flex items-center">
                                    <i className="fa-solid fa-layer-group text-slate-400 text-xs pl-2"></i>
                                    <select 
                                        className="bg-transparent text-white text-xs font-bold outline-none cursor-pointer px-2 py-1"
                                        value={mapStyle}
                                        onChange={e => setMapStyle(e.target.value)}
                                    >
                                        <option value="oscuro" className="bg-slate-900">Modo Noche</option>
                                        <option value="claro" className="bg-slate-900">Modo Día</option>
                                        <option value="satelite" className="bg-slate-900">Satélite</option>
                                    </select>
                                </div>
                            </div>

                            {isLoading ? (
                                <div className="absolute inset-0 flex flex-col items-center justify-center text-emerald-500 bg-slate-950/50 backdrop-blur-sm z-[500]">
                                    <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                    <p className="font-bold tracking-widest text-sm uppercase">Cargando Cartografía...</p>
                                </div>
                            ) : errorMsg ? (
                                <div className="absolute inset-0 flex flex-col items-center justify-center text-rose-500 bg-slate-950/90 backdrop-blur-sm z-[500] p-6 text-center">
                                    <i className="fa-solid fa-map-location-dot text-5xl mb-4 opacity-50"></i>
                                    <h3 className="font-black text-xl mb-2 text-white">Atención de Sistema</h3>
                                    <p className="font-medium text-slate-300 max-w-md">{errorMsg}</p>
                                </div>
                            ) : (
                                <MapaInteractivo 
                                    data={datosFiltrados} 
                                    mapStyle={mapStyle} 
                                    coloresEspecie={listas.colores} 
                                    mostrarNotificantes={mostrarNotificantes} 
                                />
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <GeomapaDashboard />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
